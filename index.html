<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCOTT UX &amp; UI LAB — Experience Design Studio</title>
  <meta name="description"
    content="Scott UX Lab — A UX design studio crafting bold, intuitive digital experiences for forward-thinking teams." />

  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://prod.spline.design" crossorigin />

  <!-- Non-render-blocking font loading -->
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet" />
  </noscript>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Inline critical loader styles so the page doesn't flash white -->
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
    }

    body.is-loading {
      overflow: hidden;
    }

    #page-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    .loader__logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: #fff;
    }

    .loader__logo span {
      color: #e0ff00;
    }

    .loader__status {
      margin-top: 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .loader__progress {
      margin-top: 1.2rem;
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loader__progress-fill {
      height: 100%;
      width: 0%;
      background: #e0ff00;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .loader__percent {
      margin-top: 0.8rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #e0ff00;
    }
  </style>
</head>

<body class="is-loading">
  <!-- Loader is in the raw HTML so it shows instantly, before Vue hydrates -->
  <div id="page-loader" aria-hidden="true">
    <div class="loader__logo">✦ SCOTT <span>UX</span> &amp; UI LAB</div>
    <div class="loader__status" id="loader-status-text">loading experience</div>
    <div class="loader__progress">
      <div class="loader__progress-fill" id="loader-progress-fill"></div>
    </div>
    <div class="loader__percent" id="loader-progress-text">0%</div>
  </div>

  <!-- Instantly remove loader on non-home pages (case studies, etc.) -->
  <script>
    if (window.location.pathname !== '/') {
      var loader = document.getElementById('page-loader');
      if (loader) loader.remove();
      document.body.classList.remove('is-loading');
    }
  </script>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>

  <!-- Load Spline viewer immediately so the 3D scene downloads behind the loader -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.28/build/spline-viewer.js"></script>
</body>

</html>
